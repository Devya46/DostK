<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Khata Dost | Premium Header</title>
    <!-- Font Awesome 6 -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Helvetica,
          sans-serif;
        background: #fafdff;
        color: #1a2c3e;
        scroll-behavior: smooth;
      }

      :root {
        --primary: #1a5f9e;
        --primary-dark: #0f4c7a;
        --primary-light: #2b7fc1;
        --gray-light: #f5f9fe;
        --shadow-sm:
          0 5px 18px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.03);
        --shadow-md: 0 12px 28px -8px rgba(0, 0, 0, 0.07);
        --transition-smooth: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }

      /* ----- HEADER (Fixed) ----- */
      .navbar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(10px);
        z-index: 1100;
        transition: var(--transition-smooth);
        border-bottom: 1px solid rgba(26, 95, 158, 0.06);
      }

      /* compact + rounded version on scroll */
      .navbar.is-compact {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(14px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        border-bottom: none;
        border-radius: 0 0 32px 32px;
        max-width: 92%;
        left: 4%;
        right: 4%;
        width: 92%;
        margin-top: 12px;
      }

      .navbar.is-compact .nav-container {
        padding: 6px 24px;
      }

      .navbar.is-compact .logo-area img {
        width: 38px;
        height: 38px;
      }

      .navbar.is-compact .logo-text h1 {
        font-size: 1.4rem;
      }

      .navbar.is-compact .logo-text p {
        font-size: 0.6rem;
      }

      .navbar.is-compact .nav-links a {
        font-size: 0.9rem;
      }

      .navbar.is-compact .contact-btn-glow {
        padding: 6px 20px;
        font-size: 0.85rem;
      }

      .navbar.is-compact .dropdown-menu {
        top: calc(100% + 6px);
      }

      .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 32px;
        max-width: 1400px;
        margin: 0 auto;
        transition: padding 0.25s ease;
      }

      /* LOGO AREA */
      .logo-area {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
      }

      .logo-area img {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        object-fit: cover;
        filter: drop-shadow(0 4px 8px rgba(26, 95, 158, 0.12));
        transition: 0.25s;
      }

      .logo-text h1 {
        font-size: 1.85rem;
        font-weight: 800;
        background: linear-gradient(130deg, #0a2b4e, #1a5f9e);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: -0.3px;
        line-height: 1.2;
      }

      .logo-text p {
        font-size: 0.7rem;
        font-weight: 700;
        color: #2c6e9e;
        letter-spacing: 0.6px;
      }

      /* DESKTOP NAVIGATION */
      .nav-links {
        display: flex;
        gap: 32px;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        font-weight: 600;
        color: #1f3b4c;
        transition: 0.2s;
        font-size: 1rem;
      }

      .nav-links a:hover {
        color: var(--primary);
      }

      /* DROPDOWN (desktop premium) */
      .dropdown {
        position: relative;
      }

      .dropdown-btn {
        background: transparent;
        border: none;
        font-weight: 600;
        font-size: 1rem;
        color: #1f3b4c;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: inherit;
        transition: 0.2s;
        padding: 6px 0;
      }

      .dropdown-btn i {
        font-size: 0.75rem;
        transition: transform 0.2s;
      }

      .dropdown:hover .dropdown-btn i {
        transform: rotate(180deg);
      }

      .dropdown-btn:hover {
        color: var(--primary);
      }

      .dropdown-menu {
        position: absolute;
        top: calc(100% + 12px);
        left: -20px;
        background: white;
        min-width: 240px;
        border-radius: 24px;
        box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.18);
        padding: 12px 8px;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.25s ease;
        border: 1px solid rgba(26, 95, 158, 0.08);
        z-index: 1200;
        backdrop-filter: blur(4px);
      }

      .dropdown:hover .dropdown-menu {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      .dropdown-menu a {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 16px;
        color: #1e2f3e;
        font-weight: 500;
        font-size: 0.9rem;
        border-radius: 16px;
        transition: 0.2s;
      }

      .dropdown-menu a i {
        width: 24px;
        color: var(--primary-light);
        font-size: 1rem;
      }

      .dropdown-menu a:hover {
        background: #f0f7fe;
        color: var(--primary-dark);
        transform: translateX(4px);
      }

      .contact-btn-glow {
        background: linear-gradient(100deg, #1a5f9e, #2b7fc1);
        color: white !important;
        padding: 10px 26px;
        border-radius: 40px;
        font-weight: 700;
        box-shadow: 0 5px 12px rgba(26, 95, 158, 0.25);
        transition: 0.2s;
        display: inline-block;
      }

      .contact-btn-glow:hover {
        transform: scale(1.02);
        background: linear-gradient(100deg, #0f4c7a, #1e6ea8);
        box-shadow: 0 8px 20px rgba(26, 95, 158, 0.35);
      }

      /* HAMBURGER BUTTON (icon at start) */
      .hamburger-icon {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: rgba(26, 95, 158, 0.08);
        padding: 8px 16px;
        border-radius: 60px;
        cursor: pointer;
        transition: 0.2s;
        backdrop-filter: blur(2px);
        font-weight: 500;
      }

      .hamburger-icon i {
        font-size: 1.3rem;
        color: var(--primary);
      }

      .hamburger-icon span {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--primary-dark);
      }

      .hamburger-icon:hover {
        background: rgba(26, 95, 158, 0.15);
        transform: scale(0.98);
      }

      /* ===== LEFT SLIDE MENU (PREMIUM, NOT FULL PAGE) ===== */
      .side-menu {
        position: fixed;
        top: 0;
        left: 0;
        width: 320px;
        max-width: 85vw;
        height: 100vh;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        box-shadow: 12px 0 40px rgba(0, 0, 0, 0.08);
        z-index: 2000;
        transform: translateX(-100%);
        transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        display: flex;
        flex-direction: column;
        border-right: 1px solid rgba(26, 95, 158, 0.1);
      }

      .side-menu.open {
        transform: translateX(0);
      }

      /* overlay behind menu (dark subtle, but won't affect bg scroll locking) */
      .menu-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(2px);
        z-index: 1999;
        opacity: 0;
        visibility: hidden;
        transition: 0.25s ease;
      }

      .menu-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      /* side menu header */
      .side-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 28px 24px 16px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      .side-header .logo-small {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .side-header .logo-small img {
        width: 40px;
        height: 40px;
        border-radius: 12px;
      }

      .side-header .logo-small h4 {
        font-size: 1.2rem;
        font-weight: 800;
        background: linear-gradient(120deg, #0a2b4e, #1a5f9e);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }

      .close-menu {
        background: rgba(26, 95, 158, 0.1);
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 30px;
        font-size: 1.3rem;
        cursor: pointer;
        color: var(--primary);
        transition: 0.2s;
      }

      .close-menu:hover {
        background: rgba(26, 95, 158, 0.2);
        transform: rotate(90deg);
      }

      /* side menu navigation */
      .side-nav {
        flex: 1;
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .side-nav-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.1rem;
        color: #1f3b4c;
        padding: 10px 12px;
        border-radius: 20px;
        transition: 0.2s;
      }

      .side-nav-item i:first-child {
        width: 28px;
        color: var(--primary-light);
      }

      .side-nav-item:hover {
        background: #f0f7fe;
        transform: translateX(4px);
      }

      /* dropdown inside side menu (compact) */
      .side-dropdown {
        display: flex;
        flex-direction: column;
        margin-left: 8px;
      }

      .side-dropdown-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 12px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1.1rem;
        color: #1f3b4c;
        transition: 0.2s;
      }

      .side-dropdown-header i:first-child {
        width: 28px;
        color: var(--primary-light);
      }

      .side-dropdown-header:hover {
        background: #f0f7fe;
      }

      .side-submenu {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding-left: 44px;
        margin-top: 8px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-out;
      }

      .side-submenu.open {
        max-height: 280px;
      }

      .side-submenu a {
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
        color: #2c6e9e;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        transition: 0.15s;
      }

      .side-submenu a i {
        width: 24px;
        font-size: 0.9rem;
      }

      .side-submenu a:hover {
        color: var(--primary-dark);
        transform: translateX(5px);
      }

      .side-menu-footer {
        padding: 20px 24px 30px;
        border-top: 1px solid rgba(0, 0, 0, 0.05);
      }

      .side-menu-footer .start-now-premium {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: linear-gradient(100deg, #1a5f9e, #2b7fc1);
        color: white;
        text-decoration: none;
        padding: 12px;
        border-radius: 40px;
        font-weight: 700;
        text-align: center;
      }

      /* Arrow at end ( > ) requirement inside side menu */
      .end-arrow {
        margin-top: 20px;
        text-align: center;
        font-size: 1.8rem;
        color: var(--primary-light);
        opacity: 0.6;
        letter-spacing: 4px;
      }

      /* prevent body scroll when side menu open */
      body.menu-open {
        overflow: hidden;
      }

      /* responsive */
      @media (max-width: 950px) {
        .nav-links {
          display: none;
        }
        .hamburger-icon {
          display: flex;
        }
        .nav-container {
          padding: 10px 20px;
        }
      }

      /* dummy content */
      .hero-section {
        margin-top: 90px;
        padding: 50px 24px 80px;
        max-width: 1300px;
        margin-left: auto;
        margin-right: auto;
      }

      .hero-section h1 {
        font-size: 3rem;
        background: linear-gradient(135deg, #0a2b4e, #1f6eb0);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
        gap: 28px;
        margin: 60px 0;
      }

      .service-card {
        background: white;
        border-radius: 32px;
        padding: 26px;
        box-shadow: var(--shadow-md);
        transition: 0.25s;
        border: 1px solid rgba(0, 0, 0, 0.02);
      }

      footer {
        background: #eef3fc;
        text-align: center;
        padding: 36px;
        border-radius: 40px 40px 0 0;
      }

      @media (max-width: 700px) {
        .hero-section h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="navbar" id="mainNavbar">
        <div class="nav-container">
          <div class="logo-area">
            <a href="index.html"
              ><img src="images/Logo1-removebg-preview.png" alt="Khata Dost"
            /></a>
            <div class="logo-text">
              <h1>Khata Dost</h1>
              <p>ACCOUNTING & TAXATION</p>
            </div>
          </div>

          <!-- Desktop Navigation -->
          <div class="nav-links">
            <a href="index.html">Home</a>
            <div class="dropdown">
              <button class="dropdown-btn">
                Services <i class="fas fa-chevron-down"></i>
              </button>
              <div class="dropdown-menu">
                <a href="#gst"
                  ><i class="fas fa-file-invoice-dollar"></i> GST Return</a
                >
                <a href="#itr"
                  ><i class="fas fa-chart-line"></i> Income Tax Return</a
                >
                <a href="#dsc"
                  ><i class="fas fa-signature"></i> Digital Signature</a
                >
                <a href="#taxplan"
                  ><i class="fas fa-calculator"></i> Tax Planning</a
                >
              </div>
            </div>
            <a href="#about">About Us</a>
            <a href="#testimonials">Reviews</a>
            <a href="#contact" class="contact-btn-glow">Start Now</a>
          </div>

          <!-- Hamburger with icon at start & text (premium) -->
          <div class="hamburger-icon" id="hamburgerTrigger">
            <i class="fas fa-bars"></i>
            <span>Menu</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Left sliding menu (not full page) with premium design -->
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="side-menu" id="sideMenu">
      <div class="side-header">
        <div class="logo-small">
          <img src="https://placehold.co/200x200?text=KD" alt="logo" />
          <h4>Khata Dost</h4>
        </div>
        <button class="close-menu" id="closeSideMenu">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="side-nav">
        <a href="index.html" class="side-nav-item"
          ><i class="fas fa-home"></i> Home <i class="fas fa-chevron-right"></i
        ></a>

        <!-- Services dropdown in side menu (compact spacing) -->
        <div class="side-dropdown">
          <div class="side-dropdown-header" id="sideDropdownHeader">
            <span><i class="fas fa-server"></i> Services</span>
            <i class="fas fa-chevron-down" id="sideDropdownIcon"></i>
          </div>
          <div class="side-submenu" id="sideSubmenu">
            <a href="#gst"
              ><i class="fas fa-file-invoice-dollar"></i> GST Return</a
            >
            <a href="#itr"
              ><i class="fas fa-chart-line"></i> Income Tax Return</a
            >
            <a href="#dsc"
              ><i class="fas fa-signature"></i> Digital Signature</a
            >
            <a href="#taxplan"
              ><i class="fas fa-calculator"></i> Tax Planning</a
            >
          </div>
        </div>

        <a href="#about" class="side-nav-item"
          ><i class="fas fa-users"></i> About Us
          <i class="fas fa-chevron-right"></i
        ></a>
        <a href="#testimonials" class="side-nav-item"
          ><i class="fas fa-star"></i> Reviews
          <i class="fas fa-chevron-right"></i
        ></a>
      </div>
      <div class="side-menu-footer">
        <a href="#contact" class="start-now-premium"
          ><i class="fas fa-rocket"></i> Start Now
          <i class="fas fa-arrow-right"></i
        ></a>
        <!-- Arrow at end ( > ) as requested -->
        <div class="end-arrow">
          <i class="fas fa-angle-double-right"></i>
          <i class="fas fa-greater-than"></i>
        </div>
      </div>
    </div>

    <script>
      (function () {
        // DOM elements
        const navbar = document.getElementById("mainNavbar");
        const hamburgerBtn = document.getElementById("hamburgerTrigger");
        const sideMenu = document.getElementById("sideMenu");
        const overlay = document.getElementById("menuOverlay");
        const closeSideBtn = document.getElementById("closeSideMenu");
        const sideDropdownHeader =
          document.getElementById("sideDropdownHeader");
        const sideSubmenu = document.getElementById("sideSubmenu");
        const sideDropdownIcon = document.getElementById("sideDropdownIcon");
        const body = document.body;

        // 1) Scroll compact + rounded header
        function handleScroll() {
          if (window.scrollY > 20) {
            navbar.classList.add("is-compact");
          } else {
            navbar.classList.remove("is-compact");
          }
        }
        window.addEventListener("scroll", handleScroll);
        handleScroll();

        // 2) Open side menu (from left, not full page)
        function openSideMenu() {
          sideMenu.classList.add("open");
          overlay.classList.add("active");
          body.classList.add("menu-open"); // block background scroll
        }

        function closeSideMenu() {
          sideMenu.classList.remove("open");
          overlay.classList.remove("active");
          body.classList.remove("menu-open");
          // reset submenu if needed? keep consistent but no auto close of submenu
          if (sideSubmenu.classList.contains("open")) {
            sideSubmenu.classList.remove("open");
            if (sideDropdownIcon)
              sideDropdownIcon.style.transform = "rotate(0deg)";
          }
        }

        hamburgerBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          openSideMenu();
        });

        closeSideBtn.addEventListener("click", closeSideMenu);
        overlay.addEventListener("click", closeSideMenu);

        // 3) Toggle dropdown in side menu (compact, premium spacing)
        if (sideDropdownHeader) {
          sideDropdownHeader.addEventListener("click", (e) => {
            e.preventDefault();
            sideSubmenu.classList.toggle("open");
            if (sideSubmenu.classList.contains("open")) {
              sideDropdownIcon.style.transform = "rotate(180deg)";
            } else {
              sideDropdownIcon.style.transform = "rotate(0deg)";
            }
          });
        }

        // 4) close side menu when clicking any link inside (smooth navigation)
        const allSideLinks = document.querySelectorAll(
          ".side-nav a, .side-submenu a, .start-now-premium",
        );
        allSideLinks.forEach((link) => {
          link.addEventListener("click", () => {
            closeSideMenu();
          });
        });

        // also if someone clicks on logo-area? not needed.

        // 5) Prevent background scroll conflict on resize.
        window.addEventListener("resize", () => {
          if (window.innerWidth > 950 && sideMenu.classList.contains("open")) {
            closeSideMenu();
          }
        });

        // 6) For desktop dropdown: keep hover but also optional click for touch
        const desktopDropdown = document.querySelector(".dropdown");
        if (desktopDropdown && window.matchMedia("(hover: none)").matches) {
          desktopDropdown.addEventListener("click", (e) => {
            e.stopPropagation();
            const menu = desktopDropdown.querySelector(".dropdown-menu");
            if (menu.style.visibility === "visible") {
              menu.style.opacity = "0";
              menu.style.visibility = "hidden";
            } else {
              menu.style.opacity = "1";
              menu.style.visibility = "visible";
            }
          });
          document.addEventListener("click", (e) => {
            if (!desktopDropdown.contains(e.target)) {
              const menu = desktopDropdown.querySelector(".dropdown-menu");
              if (menu) {
                menu.style.opacity = "0";
                menu.style.visibility = "hidden";
              }
            }
          });
        }

        // Ensure no body scroll when menu open, handled by body.menu-open
        // All premium touches: side menu width max 320px, no full-page, blurred backdrop, left slide.
        // Also spacing in hamburger menu dropdown is now minimal & premium (padding 10-12px, gap optimized)
        // Arrow at end ( > ) included in side-menu footer: end-arrow div with double angle and greater-than.
        // Also icon at start: hamburger icon shows <i class="fas fa-bars"></i> + text "Menu"
      })();
    </script>

    <!-- extra style to ensure no margin issue, submenu spacing compact -->
    <style>
      .side-submenu a {
        margin: 2px 0;
      }
      .side-nav-item,
      .side-dropdown-header {
        margin-bottom: 2px;
      }
      .side-menu {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(16px);
      }
      .side-submenu {
        margin-left: 12px;
      }
      .end-arrow {
        margin-top: 18px;
        opacity: 0.7;
      }
      .hamburger-icon span {
        font-weight: 600;
      }
      .navbar.is-compact .hamburger-icon {
        padding: 5px 12px;
      }
      /* reduce space in hamburger dropdown menu (premium compactness already applied) */
      .side-nav {
        gap: 12px;
      }
      .side-dropdown-header,
      .side-nav-item {
        border-radius: 18px;
      }
      .side-submenu {
        gap: 10px;
      }
      /* subtle premium glow */
      .start-now-premium {
        transition: 0.2s;
      }
      .start-now-premium:hover {
        transform: scale(1.02);
        box-shadow: 0 6px 14px rgba(26, 95, 158, 0.3);
      }
    </style>
  </body>
</html>
