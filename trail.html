<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Khata Dost Logo</title>

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f6f6f6;
        overflow: hidden;
        padding: 20px;
      }

      .logo {
        position: relative;
        display: flex;
        align-items: flex-end;
        font-family: "Cormorant Garamond", serif;
        line-height: 0.82;
      }

      /* LEAF ICON */
      .leaf {
        position: absolute;
        top: -45px;
        left: 12px;
        width: 85px;
        height: 85px;
        transform: rotate(-15deg);
        z-index: 5;
      }

      .leaf img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      /* TEXT */
      .logo-text {
        font-size: 180px;
        font-weight: 500;
        letter-spacing: -4px;
        white-space: nowrap;
      }

      /* KHATA */
      .dark {
        color: #003f8f;
      }

      /* DOST */
      .light {
        background: linear-gradient(to right, #6fd1ff, #b9eeff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      @media (max-width: 900px) {
        .logo {
          transform: scale(0.58);
        }
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <!-- LEAF -->
      <div class="leaf">
        <img
          src="https://cdn-icons-png.flaticon.com/128/9629/9629324.png"
          alt="leaf"
        />
      </div>

      <!-- TEXT -->
      <div class="logo-text">
        <span class="dark">Khata</span>
        <span class="light">Dost</span>
      </div>
    </div>
  </body>
</html>
