<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Circle Hover Button</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b1220;
        font-family: Arial, sans-serif;
      }

      .btn-hover {
        position: relative;
        overflow: hidden;
        padding: 16px 38px;
        border: none;
        outline: none;
        background: linear-gradient(100deg, #1a5f9e, #2b7fc1);
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        border-radius: 14px;
        cursor: pointer;
        letter-spacing: 0.5px;
        z-index: 1;
        transition:
          color 0.4s ease,
          transform 0.3s ease;
      }

      .btn-hover::before {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        background: #1b07a1d9;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        transition: transform 0.7s ease;
        z-index: -1;
      }

      .btn-hover:hover::before {
        transform: translate(-50%, -50%) scale(25);
      }

      .btn-hover:hover {
        /* transform: translateY(-3px); */
      }
    </style>
  </head>

  <body>
    <button class="btn-hover">Contact Us</button>
  </body>
</html>
